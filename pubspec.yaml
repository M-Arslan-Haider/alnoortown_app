name: alnoortown_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2
  shared_preferences: ^2.2.2
  image_picker: ^1.0.5

  # Utilities
  provider: ^6.1.5+1
  flutter_launcher_icons: ^0.14.4
  http: ^1.2.0
  http_parser: ^4.0.2
  in_app_update: ^4.2.5
#  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/icon.png
    - assets/images/icon2.png
    - assets/images/icon3.png
    - assets/images/icon4.jpeg
    - assets/images/icon5.png
    - assets/images/iconnew.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/iconnew.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/iconnew.png"
  remove_alpha_ios: true

